<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ShortLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0a0a0a;
            color: #ffffff;
        }
        .sidebar {
            background: #1a1a1a;
            min-height: 100vh;
        }
        .main-content {
            padding: 20px;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3">
                    <h4><i class="fas fa-shield-alt me-2"></i>Admin Panel</h4>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#" onclick="loadSection('dashboard')">
                        <i class="fas fa-chart-line me-2"></i>Dashboard
                    </a>
                    <a class="nav-link" href="#" onclick="loadSection('users')">
                        <i class="fas fa-users me-2"></i>Users
                    </a>
                    <a class="nav-link" href="#" onclick="loadSection('links')">
                        <i class="fas fa-link me-2"></i>Links
                    </a>
                    <a class="nav-link" href="#" onclick="loadSection('activity')">
                        <i class="fas fa-clock me-2"></i>Activity
                    </a>
                    <a class="nav-link" href="#" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div id="content">
                    <!-- Content loaded dynamically -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('accessToken');
        
        // Check admin access
        async function checkAdminAccess() {
            if (!token) {
                window.location.href = '/';
                return false;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.success || data.data.role !== 'admin') {
                    window.location.href = '/dashboard';
                    return false;
                }
                
                return true;
            } catch (error) {
                window.location.href = '/';
                return false;
            }
        }
        
        // Load admin dashboard
        async function loadDashboard() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.data;
                    content.innerHTML = `
                        <div class="row mb-4">
                            <div class="col-md-3">
                                <div class="stat-card text-center">
                                    <div class="stat-number">${stats.totalUsers}</div>
                                    <p>Total Users</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card text-center">
                                    <div class="stat-number">${stats.totalLinks}</div>
                                    <p>Total Links</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card text-center">
                                    <div class="stat-number">${stats.totalClicks.toLocaleString()}</div>
                                    <p>Total Clicks</p>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card text-center">
                                    <div class="stat-number">${stats.activeUsers}</div>
                                    <p>Active Users</p>
                                </div>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <div class="stat-card">
                                    <h5>Recent Activity</h5>
                                    <canvas id="activityChart"></canvas>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="stat-card">
                                    <h5>Top Users</h5>
                                    <table class="table table-sm">
                                        <thead>
                                            <tr>
                                                <th>User</th>
                                                <th>Links</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${stats.topUsers.map(user => `
                                                <tr>
                                                    <td>${user.name}</td>
                                                    <td>${user.linkCount}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <h5>Quick Stats</h5>
                            <p>New Links (24h): ${stats.newLinks24h}</p>
                            <p>Clicks (24h): ${stats.clicks24h}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                content.innerHTML = '<div class="alert alert-danger">Failed to load dashboard</div>';
            }
        }
        
        // Load users section
        async function loadUsers() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    content.innerHTML = `
                        <div class="stat-card">
                            <h4>Users</h4>
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Email</th>
                                            <th>Role</th>
                                            <th>Plan</th>
                                            <th>Links</th>
                                            <th>Clicks</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${data.data.users.map(user => `
                                            <tr>
                                                <td>${user.name}</td>
                                                <td>${user.email}</td>
                                                <td>
                                                    <span class="badge bg-${user.role === 'admin' ? 'danger' : 'info'}">
                                                        ${user.role}
                                                    </span>
                                                </td>
                                                <td>${user.plan}</td>
                                                <td>${user.totalLinks}</td>
                                                <td>${user.totalClicks}</td>
                                                <td>
                                                    <button class="btn btn-sm btn-warning" onclick="editUser('${user.id}')">
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button class="btn btn-sm btn-danger" onclick="deleteUser('${user.id}')">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading users:', error);
                content.innerHTML = '<div class="alert alert-danger">Failed to load users</div>';
            }
        }
        
        // Load links section
        async function loadLinks() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/admin/links`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    content.innerHTML = `
                        <div class="stat-card">
                            <h4>All Links</h4>
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Slug</th>
                                            <th>Original URL</th>
                                            <th>User</th>
                                            <th>Clicks</th>
                                            <th>Created</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${data.data.links.map(link => `
                                            <tr>
                                                <td>${link.slug}</td>
                                                <td class="text-truncate" style="max-width: 300px;">${link.originalUrl}</td>
                                                <td>${link.User?.name || 'Unknown'}</td>
                                                <td>${link.clicks}</td>
                                                <td>${new Date(link.createdAt).toLocaleDateString()}</td>
                                                <td>
                                                    <button class="btn btn-sm btn-danger" onclick="deleteLink('${link.id}')">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading links:', error);
                content.innerHTML = '<div class="alert alert-danger">Failed to load links</div>';
            }
        }
        
        // Delete user
        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user? This action cannot be undone!')) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    loadUsers();
                } else {
                    alert('Failed to delete user');
                }
            } catch (error) {
                console.error('Error deleting user:', error);
            }
        }
        
        // Delete link
        async function deleteLink(linkId) {
            if (!confirm('Are you sure you want to delete this link?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/links/${linkId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    loadLinks();
                } else {
                    alert('Failed to delete link');
                }
            } catch (error) {
                console.error('Error deleting link:', error);
            }
        }
        
        // Load section
        function loadSection(section) {
            switch(section) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'users':
                    loadUsers();
                    break;
                case 'links':
                    loadLinks();
                    break;
                default:
                    loadDashboard();
            }
        }
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = '/';
        });
        
        // Initialize
        (async () => {
            if (await checkAdminAccess()) {
                loadDashboard();
            }
        })();
    </script>
</body>
</html>
