<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ShortLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Same styles as index.html */
        body {
            background: #0a0a0a;
            color: #ffffff;
        }
        .sidebar {
            background: #1a1a1a;
            min-height: 100vh;
        }
        .main-content {
            padding: 20px;
        }
        .stat-card {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .table {
            color: #ffffff;
        }
        .table thead th {
            border-bottom-color: rgba(255,255,255,0.1);
        }
        .table td {
            border-top-color: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3">
                    <h4><i class="fas fa-link me-2"></i>ShortLink</h4>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link active" href="#">
                        <i class="fas fa-chart-line me-2"></i>Dashboard
                    </a>
                    <a class="nav-link" href="#">
                        <i class="fas fa-link me-2"></i>My Links
                    </a>
                    <a class="nav-link" href="#">
                        <i class="fas fa-chart-bar me-2"></i>Analytics
                    </a>
                    <a class="nav-link" href="#">
                        <i class="fas fa-cog me-2"></i>Settings
                    </a>
                    <a class="nav-link" href="#" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="stat-card text-center">
                            <h3 class="display-4" id="totalLinks">0</h3>
                            <p class="text-muted">Total Links</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card text-center">
                            <h3 class="display-4" id="totalClicks">0</h3>
                            <p class="text-muted">Total Clicks</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card text-center">
                            <h3 class="display-4" id="avgClicks">0</h3>
                            <p class="text-muted">Avg Clicks/Link</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card text-center">
                            <h3 class="display-4" id="linksLeft">0</h3>
                            <p class="text-muted">Links Remaining</p>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card mb-4">
                    <h4>Create New Link</h4>
                    <div class="input-group">
                        <input type="url" class="form-control" id="newUrl" placeholder="Enter your long URL">
                        <input type="text" class="form-control" id="customSlug" placeholder="Custom slug (optional)">
                        <button class="btn btn-primary" id="createLinkBtn">Create</button>
                    </div>
                    <div id="createResult" class="mt-3" style="display: none;"></div>
                </div>
                
                <div class="stat-card">
                    <h4>My Links</h4>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Short URL</th>
                                    <th>Original URL</th>
                                    <th>Clicks</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="linksTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('accessToken');
        
        // Check authentication
        if (!token) {
            window.location.href = '/';
        }
        
        // Load dashboard data
        async function loadDashboard() {
            try {
                // Load user stats
                const statsRes = await fetch(`${API_BASE}/analytics/user`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const statsData = await statsRes.json();
                
                if (statsData.success) {
                    document.getElementById('totalLinks').textContent = statsData.data.totalLinks;
                    document.getElementById('totalClicks').textContent = statsData.data.totalClicks;
                    document.getElementById('avgClicks').textContent = statsData.data.averageClicksPerLink.toFixed(1);
                    
                    // Get user info for link limit
                    const userRes = await fetch(`${API_BASE}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const userData = await userRes.json();
                    const linksLeft = userData.data.linksLimit - statsData.data.totalLinks;
                    document.getElementById('linksLeft').textContent = linksLeft;
                }
                
                // Load links
                const linksRes = await fetch(`${API_BASE}/links`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const linksData = await linksRes.json();
                
                if (linksData.success) {
                    const tbody = document.getElementById('linksTable');
                    tbody.innerHTML = '';
                    
                    linksData.data.links.forEach(link => {
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td><a href="${link.shortUrl}" target="_blank">${link.slug}</a></td>
                            <td class="text-truncate" style="max-width: 300px;">${link.originalUrl}</td>
                            <td>${link.clicks}</td>
                            <td>${new Date(link.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="copyToClipboard('${link.shortUrl}')">
                                    <i class="fas fa-copy"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteLink('${link.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        `;
                    });
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        // Create new link
        document.getElementById('createLinkBtn').addEventListener('click', async () => {
            const originalUrl = document.getElementById('newUrl').value;
            const customSlug = document.getElementById('customSlug').value;
            
            if (!originalUrl) {
                alert('Please enter a URL');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/links`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ originalUrl, customSlug: customSlug || undefined })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('createResult').innerHTML = `
                        <div class="alert alert-success">
                            Link created! <a href="${data.data.shortUrl}" target="_blank">${data.data.shortUrl}</a>
                            <button class="btn btn-sm btn-outline-light ms-2" onclick="copyToClipboard('${data.data.shortUrl}')">
                                Copy
                            </button>
                        </div>
                    `;
                    document.getElementById('createResult').style.display = 'block';
                    document.getElementById('newUrl').value = '';
                    document.getElementById('customSlug').value = '';
                    loadDashboard();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error creating link:', error);
                alert('Failed to create link');
            }
        });
        
        // Delete link
        async function deleteLink(id) {
            if (!confirm('Are you sure you want to delete this link?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/links/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    loadDashboard();
                } else {
                    alert('Failed to delete link');
                }
            } catch (error) {
                console.error('Error deleting link:', error);
            }
        }
        
        // Copy to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = '/';
        });
        
        // Initial load
        loadDashboard();
    </script>
</body>
</html>
